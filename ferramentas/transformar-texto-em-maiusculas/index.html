<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Case Converter - Transforme texto em maiúsculas, minúsculas e títulos</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 (gratuito) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Ajuste personalizado para melhorar transições e foco -->
    <style>
        body {
            background: linear-gradient(135deg, #f0f9f4 0%, #e2f0e8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .tool-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
        }
        textarea {
            transition: all 0.2s;
            resize: vertical;
        }
        textarea:focus {
            ring: 2px solid #0d9488;
            border-color: #0d9488;
            outline: none;
        }
        .btn-action {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:active {
            transform: scale(0.97);
        }
        .badge-active {
            background-color: #0f766e;
            color: white;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5 md:p-8">

    <!-- Card principal da ferramenta - substituindo <a> por <div> para tornar funcional -->
    <div class="bg-white p-6 md:p-10 rounded-[32px] shadow-xl w-full max-w-2xl tool-card transition-all">
        
        <!-- Cabeçalho com ícone e título -->
        <div class="flex items-start gap-5 mb-6 flex-wrap">
            <div class="w-16 h-16 bg-teal-50 rounded-2xl flex items-center justify-center group-hover:bg-teal-600 transition-colors">
                <i class="fa-solid fa-text-height text-teal-600 text-2xl transition-colors"></i>
            </div>
            <div class="flex-1">
                <h3 class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-2">Case Converter</h3>
                <p class="text-slate-500 text-base">Alterne entre MAIÚSCULAS, minúsculas e capitalização de títulos num clique.</p>
            </div>
        </div>
        
        <!-- Área de texto para entrada/saída -->
        <div class="mb-6">
            <label for="textInput" class="block text-sm font-semibold text-slate-700 mb-2">📝 Seu texto</label>
            <textarea id="textInput" rows="5" class="w-full border border-slate-200 rounded-2xl p-4 text-slate-800 text-base shadow-sm focus:border-teal-500 focus:ring-2 focus:ring-teal-100" placeholder="Digite ou cole seu texto aqui... Exemplo: Olá mundo! Este é um teste.">Olá mundo! Este é um teste incrível.</textarea>
        </div>

        <!-- Badges de conversão rápidas (cliques nos badges também acionam função) -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <button id="btnUpper" class="btn-action py-3 px-4 rounded-xl bg-teal-50 text-slate-800 text-sm font-bold text-center hover:bg-teal-600 hover:text-white transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-solid fa-arrow-up-wide-short text-sm"></i> UPPER CASE
            </button>
            <button id="btnLower" class="btn-action py-3 px-4 rounded-xl bg-teal-50 text-slate-800 text-sm font-bold text-center hover:bg-teal-600 hover:text-white transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-solid fa-arrow-down-wide-short text-sm"></i> lower case
            </button>
            <button id="btnTitle" class="btn-action py-3 px-4 rounded-xl bg-teal-50 text-slate-800 text-sm font-bold text-center hover:bg-teal-600 hover:text-white transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-solid fa-heading text-sm"></i> Title Case
            </button>
        </div>

        <!-- Linha de ações secundárias (copiar e limpar) -->
        <div class="flex flex-wrap items-center justify-between gap-3 pt-2 border-t border-slate-100">
            <div class="flex gap-3">
                <button id="copyBtn" class="btn-action py-2.5 px-5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 transition-all flex items-center gap-2">
                    <i class="fa-regular fa-copy"></i> Copiar texto
                </button>
                <button id="clearBtn" class="btn-action py-2.5 px-5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 transition-all flex items-center gap-2">
                    <i class="fa-regular fa-trash-can"></i> Limpar
                </button>
            </div>
            <div class="text-xs text-slate-400 bg-slate-50 py-1.5 px-3 rounded-full">
                <i class="fa-regular fa-keyboard mr-1"></i> Conversão instantânea
            </div>
        </div>

        <!-- Dica extra visual -->
        <div class="mt-6 text-center text-xs text-slate-400 border-t border-slate-50 pt-4">
            <i class="fa-regular fa-lightbulb mr-1 text-amber-400"></i> Dica: Use os botões acima ou clique nos badges para transformar o texto rapidamente.
        </div>
    </div>

    <!-- JavaScript da ferramenta Case Converter -->
    <script>
        (function() {
            // Elementos DOM
            const textarea = document.getElementById('textInput');
            const btnUpper = document.getElementById('btnUpper');
            const btnLower = document.getElementById('btnLower');
            const btnTitle = document.getElementById('btnTitle');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');

            // Função auxiliar: obter texto atual e atualizar textarea
            function setTransformedText(transformFn) {
                if (!textarea) return;
                let originalText = textarea.value;
                // Se o textarea estiver vazio, exibe um aviso sutil (opcional)
                if (originalText.trim() === "") {
                    // Mostra feedback de que não há texto (mas não quebra a função)
                    textarea.placeholder = "Digite algo para converter...";
                    setTimeout(() => {
                        textarea.placeholder = "Digite ou cole seu texto aqui... Exemplo: Olá mundo! Este é um teste.";
                    }, 1500);
                    return;
                }
                let novoTexto = transformFn(originalText);
                textarea.value = novoTexto;
                // Pequeno efeito de realce para indicar conversão
                textarea.classList.add('bg-teal-50');
                setTimeout(() => {
                    textarea.classList.remove('bg-teal-50');
                }, 200);
            }

            // 1) Transformar para MAIÚSCULAS (UPPER CASE)
            function toUpperCaseTransform(texto) {
                return texto.toUpperCase();
            }

            // 2) Transformar para minúsculas (lower case)
            function toLowerCaseTransform(texto) {
                return texto.toLowerCase();
            }

            // 3) Transformar para Title Case (capitalização de títulos)
            //    Regras: primeira letra de cada palavra em maiúscula, resto minúscula.
            //    Trata palavras com apóstrofos e caracteres especiais de forma simples.
            function toTitleCaseTransform(texto) {
                return texto.replace(/\w\S*/g, function(palavra) {
                    // Para cada palavra, transforma primeira letra em maiúscula e o restante em minúscula
                    return palavra.charAt(0).toUpperCase() + palavra.substring(1).toLowerCase();
                });
            }

            // Eventos dos botões principais
            if (btnUpper) {
                btnUpper.addEventListener('click', function(e) {
                    e.preventDefault();
                    setTransformedText(toUpperCaseTransform);
                });
            }

            if (btnLower) {
                btnLower.addEventListener('click', function(e) {
                    e.preventDefault();
                    setTransformedText(toLowerCaseTransform);
                });
            }

            if (btnTitle) {
                btnTitle.addEventListener('click', function(e) {
                    e.preventDefault();
                    setTransformedText(toTitleCaseTransform);
                });
            }

            // Botão copiar texto para a área de transferência (com fallback)
            if (copyBtn) {
                copyBtn.addEventListener('click', async function(e) {
                    e.preventDefault();
                    const textoAtual = textarea.value;
                    if (!textoAtual.trim()) {
                        // Mostra breve notificação visual caso esteja vazio
                        showToast("⚠️ Nada para copiar. Digite algum texto primeiro.", "warning");
                        return;
                    }
                    try {
                        await navigator.clipboard.writeText(textoAtual);
                        showToast("✅ Texto copiado para a área de transferência!", "success");
                        // Pequena animação no botão copiar
                        copyBtn.classList.add('bg-teal-100');
                        setTimeout(() => copyBtn.classList.remove('bg-teal-100'), 300);
                    } catch (err) {
                        console.error("Falha ao copiar: ", err);
                        // Fallback para navegadores antigos
                        textarea.select();
                        document.execCommand('copy');
                        showToast("📋 Copiado (método alternativo)", "info");
                    }
                });
            }

            // Botão limpar textarea
            if (clearBtn) {
                clearBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    textarea.value = "";
                    textarea.focus();
                    showToast("🧹 Texto limpo. Digite novo conteúdo.", "info");
                });
            }

            // Função simples de toast/feedback não intrusivo (dispensa bibliotecas)
            function showToast(message, type = "info") {
                // Cria elemento de toast flutuante
                let toast = document.createElement('div');
                toast.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full text-white text-sm font-medium shadow-lg z-50 transition-all duration-300 flex items-center gap-2`;
                if (type === "success") toast.style.backgroundColor = "#0f766e";
                else if (type === "warning") toast.style.backgroundColor = "#d97706";
                else toast.style.backgroundColor = "#1e293b";
                
                let icon = document.createElement('i');
                if (type === "success") icon.className = "fa-regular fa-circle-check";
                else if (type === "warning") icon.className = "fa-regular fa-circle-exclamation";
                else icon.className = "fa-regular fa-info-circle";
                
                let span = document.createElement('span');
                span.textContent = message;
                
                toast.appendChild(icon);
                toast.appendChild(span);
                document.body.appendChild(toast);
                
                // Remover após 2 segundos
                setTimeout(() => {
                    toast.style.opacity = "0";
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                    }, 300);
                }, 2200);
            }

            // Opcional: atalhos de teclado (Ctrl+U para maiúsculas, Ctrl+L para minúsculas, Ctrl+T para título)
            document.addEventListener('keydown', function(e) {
                // Verifica se o elemento ativo é o textarea para evitar conflitos com atalhos do navegador
                if (document.activeElement === textarea) {
                    if (e.ctrlKey && e.key === 'u') {
                        e.preventDefault();
                        setTransformedText(toUpperCaseTransform);
                        showToast("🔠 Convertido para MAIÚSCULAS", "success");
                    } else if (e.ctrlKey && e.key === 'l') {
                        e.preventDefault();
                        setTransformedText(toLowerCaseTransform);
                        showToast("🔡 Convertido para minúsculas", "success");
                    } else if (e.ctrlKey && e.key === 't') {
                        e.preventDefault();
                        setTransformedText(toTitleCaseTransform);
                        showToast("📖 Convertido para Title Case", "success");
                    }
                }
            });

            // Pequeno indicador de carregamento: tudo pronto
            console.log("Case Converter carregado com sucesso - transformação minúsculas para maiúsculas e mais!");
        })();
    </script>
</body>
</html>
