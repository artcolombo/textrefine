<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextPure - Editor de Texto Profissional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; }
        .text-gradient {
            background: linear-gradient(135deg, #1a3a4a 0%, #2dd4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tool-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(226, 232, 240, 0.8);
            text-decoration: none;
            display: block;
        }
        .tool-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(26, 58, 74, 0.12);
            border-color: #2dd4bf;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-slate-100">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2 group">
                <div class="bg-[#1a3a4a] p-2 rounded-xl">
                    <i class="fa-solid fa-feather-pointed text-white text-xl"></i>
                </div>
                <span class="text-[#1a3a4a] text-2xl font-extrabold">TextPure</span>
            </div>
            <div class="flex items-center space-x-5">
                <a href="/" class="text-sm font-bold text-teal-600">Início</a>
                <button class="bg-[#1a3a4a] text-white px-6 py-2 rounded-xl text-sm font-bold">Grátis</button>
            </div>
        </nav>
    </header>

    <main id="tools" class="max-w-7xl mx-auto px-6 py-24">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- A CORREÇÃO ESTÁ AQUI: href="/..." com barra inicial -->
            <a href="/ferramentas/transformar-texto-em-maiusculas/index.html" 
               class="tool-card bg-white p-10 rounded-[32px] group">
                <div class="w-16 h-16 bg-teal-50 rounded-2xl flex items-center justify-center mb-8 group-hover:bg-teal-600 transition-colors">
                    <i class="fa-solid fa-text-height text-teal-600 text-2xl group-hover:text-white transition-colors"></i>
                </div>
                <h3 class="text-xl font-extrabold text-slate-900 mb-4">Case Converter</h3>
                <p class="text-slate-500 mb-8">Transforme o seu texto em MAIÚSCULAS instantaneamente.</p>
                <div class="grid grid-cols-2 gap-2">
                    <span class="py-2 px-3 rounded-lg bg-slate-50 text-[10px] text-center font-bold text-slate-600 group-hover:bg-[#1a3a4a] group-hover:text-white transition">UPPER</span>
                    <span class="py-2 px-3 rounded-lg bg-slate-50 text-[10px] text-center font-bold text-slate-600 group-hover:bg-[#1a3a4a] group-hover:text-white transition">lower</span>
                </div>
            </a>

            <!-- Placeholder -->
            <div class="tool-card bg-slate-50 p-10 rounded-[32px] opacity-50 border-dashed border-2">
                <h3 class="text-xl font-extrabold text-slate-400">Em breve</h3>
            </div>

        </div>
    </main>

    <footer class="bg-slate-950 text-slate-500 py-12 text-center text-[10px] font-bold uppercase">
        © 2026 TEXTPURE.
    </footer>

</body>
</html>
